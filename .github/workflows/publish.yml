name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for NuGet Trusted Publishing
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'
      - name: Pack
        run: dotnet pack src/CSharpLanguageServer/CSharpLanguageServer.fsproj -c Release -o release
      - name: NuGet login (OIDC -> short-lived key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ZacharyChristmas
      - name: Push
        run: dotnet nuget push "release/*.nupkg" --api-key ${{ steps.login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
